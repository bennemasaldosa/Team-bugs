<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - Prescripto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fa-solid fa-notes-medical logo-icon"></i>
                <h1>Prescripto</h1>
                <p>Healthcare Assistant</p>
            </div>
            
            <div class="login-body" style="padding: 2.5rem 2rem;">
                <h2>Reset Password</h2>
                <p class="subtitle" style="margin-bottom: 2rem;">Enter your new password below.</p>
                
                <form id="reset-password-form">
                    <div class="input-group" style="margin-bottom: 1.5rem;">
                        <label>New Password</label>
                        <input type="password" id="new-password" placeholder="••••••••" required style="width: 100%; padding: 1rem; border: 1px solid var(--clr-light-blue); border-radius: 8px; font-size: 1rem;">
                    </div>
                    <div class="input-group">
                        <label>Confirm Password</label>
                        <input type="password" id="confirm-password" placeholder="••••••••" required style="width: 100%; padding: 1rem; border: 1px solid var(--clr-light-blue); border-radius: 8px; font-size: 1rem;">
                    </div>
                    
                    <button type="submit" class="login-btn" style="width: 100%; border: none; cursor: pointer; margin-top: 1.5rem; padding: 1rem; background: var(--clr-blue); color: white; border-radius: 8px; font-weight: 600; font-size: 1.1rem;">
                        Update Password
                    </button>
                </form>

                <div id="reset-message" style="margin-top: 1.5rem; text-align: center; display: none; padding: 1rem; border-radius: 6px;"></div>

                <div class="login-footer" style="margin-top: 2rem; border-top: 1px solid var(--clr-light-blue); padding-top: 1.5rem;">
                    <p>Back to <a href="/login">Login</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            const messageDiv = document.getElementById('reset-message');
            messageDiv.style.display = 'block';
            messageDiv.innerText = 'Invalid reset link. No token found.';
            messageDiv.style.background = '#fef2f2';
            messageDiv.style.color = '#dc2626';
            document.getElementById('reset-password-form').style.display = 'none';
        }

        document.getElementById('reset-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const messageDiv = document.getElementById('reset-message');

            if (newPassword !== confirmPassword) {
                messageDiv.style.display = 'block';
                messageDiv.innerText = 'Passwords do not match.';
                messageDiv.style.background = '#fef2f2';
                messageDiv.style.color = '#dc2626';
                return;
            }
            
            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: newPassword })
                });
                
                const data = await response.json();
                messageDiv.style.display = 'block';
                messageDiv.innerText = data.message;
                messageDiv.style.background = data.status === 'success' ? '#ecfdf5' : '#fef2f2';
                messageDiv.style.color = data.status === 'success' ? '#059669' : '#dc2626';

                if (data.status === 'success') {
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                }
            } catch (error) {
                console.error('Error:', error);
                messageDiv.style.display = 'block';
                messageDiv.innerText = 'An error occurred. Please try again.';
                messageDiv.style.background = '#fef2f2';
                messageDiv.style.color = '#dc2626';
            }
        });
    </script>
</body>
</html>
