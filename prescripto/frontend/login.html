<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Prescripto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fa-solid fa-notes-medical logo-icon"></i>
                <h1>Prescripto</h1>
                <p>Healthcare Assistant</p>
            </div>
            
            <div class="login-body">
                <div class="auth-tabs">
                    <button id="tab-login" class="auth-tab active">Login</button>
                    <button id="tab-register" class="auth-tab">Register</button>
                </div>

                <div id="login-section">
                    <form id="manual-login-form">
                        <div class="input-group">
                            <label>Email Address</label>
                            <input type="email" id="login-email" placeholder="patient@example.com" required>
                        </div>
                        <div class="input-group">
                            <label>Password</label>
                            <input type="password" id="login-password" placeholder="••••••••" required>
                        </div>
                        <div class="forgot-password-link" style="text-align: right; margin-bottom: 1.5rem;">
                            <a href="/forgot-password" style="font-size: 0.85rem; color: var(--clr-blue); text-decoration: none;">Forgot Password?</a>
                        </div>
                        <button type="submit" class="login-btn">Login to Dashboard</button>
                    </form>
                </div>

                <div id="register-section" style="display: none;">
                    <form id="register-form">
                        <div class="input-group">
                            <label>Full Name</label>
                            <input type="text" id="reg-name" placeholder="John Doe" required>
                        </div>
                        <div class="input-group">
                            <label>Email Address</label>
                            <input type="email" id="reg-email" placeholder="patient@example.com" required>
                        </div>
                        <div class="input-group">
                            <label>Password</label>
                            <input type="password" id="reg-password" placeholder="••••••••" required>
                        </div>
                        <button type="submit" class="login-btn" style="background: var(--clr-dark-blue);">Create Account</button>
                    </form>
                </div>

                <div id="auth-message"></div>

                <div class="divider" style="margin: 2rem 0; display: flex; align-items: center; gap: 1rem;">
                    <hr style="flex: 1; border: 0; border-top: 1px solid var(--clr-light-blue);">
                    <span style="color: var(--clr-gray); font-size: 0.8rem; font-weight: 500;">OR</span>
                    <hr style="flex: 1; border: 0; border-top: 1px solid var(--clr-light-blue);">
                </div>
                
                <div class="auth-box">
                    <!-- Google Sign-In Button Container -->
                    <div id="g_id_onload"
                         data-client_id="your_google_client_id_here"
                         data-context="signin"
                         data-ux_mode="popup"
                         data-callback="handleCredentialResponse"
                         data-auto_prompt="false">
                    </div>

                    <div id="google-signin-status" style="display: none; text-align: center; width: 100%; color: #dc2626; font-size: 0.85rem; padding: 10px; background: #fef2f2; border-radius: 8px; margin-bottom: 1rem;">
                        <i class="fa-solid fa-circle-exclamation"></i> Google Auth is not fully configured.
                    </div>

                    <div class="g_id_signin"
                         data-type="standard"
                         data-shape="pill"
                         data-theme="outline"
                         data-text="signin_with"
                         data-size="large"
                         data-logo_alignment="left">
                    </div>
                </div>

                <div class="login-footer">
                    <p>By signing in, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleCredentialResponse(response) {
            // Send the token to the backend
            fetch('/api/google-login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ token: response.credential }),
            })
            .then(res => res.json())
            .then(data => {
                if (data.status === 'success') {
                    window.location.href = data.redirect;
                } else {
                    alert('Login failed: ' + data.message);
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('An error occurred during login.');
            });
        }
    </script>
    <script src="script.js"></script>
</body>
</html>
