<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - Prescripto</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fa-solid fa-notes-medical logo-icon"></i>
                <h1>Prescripto</h1>
                <p>Healthcare Assistant</p>
            </div>
            
            <div class="login-body" style="padding: 2.5rem 2rem;">
                <h2>Forgot Password?</h2>
                <p class="subtitle" style="margin-bottom: 2rem;">Enter your email address and we'll send you a link to reset your password.</p>
                
                <form id="forgot-password-form">
                    <div class="input-group">
                        <label>Email Address</label>
                        <input type="email" id="forgot-email" placeholder="patient@example.com" required style="width: 100%; padding: 1rem; border: 1px solid var(--clr-light-blue); border-radius: 8px; font-size: 1rem;">
                    </div>
                    
                    <button type="submit" class="login-btn" style="width: 100%; border: none; cursor: pointer; margin-top: 1rem; padding: 1rem; background: var(--clr-blue); color: white; border-radius: 8px; font-weight: 600; font-size: 1.1rem;">
                        Send Reset Link
                    </button>
                </form>

                <div id="forgot-message" style="margin-top: 1.5rem; text-align: center; display: none; padding: 1rem; border-radius: 6px;"></div>

                <div class="login-footer" style="margin-top: 2rem; border-top: 1px solid var(--clr-light-blue); padding-top: 1.5rem;">
                    <p>Remember your password? <a href="/login">Back to Login</a></p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('forgot-password-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('forgot-email').value;
            const messageDiv = document.getElementById('forgot-message');
            
            try {
                const response = await fetch('/api/request-password-reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await response.json();
                messageDiv.style.display = 'block';
                messageDiv.innerText = data.message;
                messageDiv.style.background = data.status === 'success' ? '#ecfdf5' : '#fef2f2';
                messageDiv.style.color = data.status === 'success' ? '#059669' : '#dc2626';
            } catch (error) {
                console.error('Error:', error);
                messageDiv.style.display = 'block';
                messageDiv.innerText = 'An error occurred. Please try again.';
                messageDiv.style.background = '#fef2f2';
                messageDiv.style.color = '#dc2626';
            }
        });
    </script>
</body>
</html>
